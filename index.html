<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Pulse Pro</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --pos: #23d18b;
            --neg: #f04e6e;
            --neu: #f1c40f;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #388bfd;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: 15px; display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 440px; }

        header { text-align: center; margin-bottom: 25px; }
        .tab-bar { 
            display: flex; background: var(--card-bg); border-radius: 14px; 
            padding: 4px; margin-bottom: 25px; border: 1px solid var(--border);
        }
        .tab { 
            flex: 1; padding: 12px; border: none; background: transparent; 
            color: var(--text-dim); font-weight: 600; border-radius: 10px; font-size: 13px;
            cursor: pointer;
        }
        .tab.active { background: var(--accent); color: white; }

        .glass-card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 24px; padding: 24px; min-height: 500px;
        }

        /* Donut Chart */
        .donut-container { display: flex; align-items: center; justify-content: space-around; margin-bottom: 30px; }
        .donut-box { position: relative; width: 120px; height: 120px; }
        .donut-box svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .donut-center {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        /* Progress Bars */
        .stat-row { margin-bottom: 15px; }
        .stat-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
        .bar-bg { background: #21262d; height: 8px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 10px; }

        /* Level Cards */
        .level-card {
            background: #0d1117; border-radius: 12px; padding: 12px 16px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid var(--border);
        }
        .level-label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
        .level-val { font-size: 14px; font-weight: 700; font-family: monospace; }

        /* Insight Box */
        .insight-box {
            background: rgba(56, 139, 253, 0.05); border: 1px dashed var(--border); 
            border-radius: 16px; padding: 16px; margin-top: 20px; font-size: 13px; 
            line-height: 1.6; color: var(--text-dim);
        }
        .insight-title { color: var(--accent); font-weight: bold; font-size: 10px; margin-bottom: 5px; text-transform: uppercase; display: block; }
        
        .news-item { font-size: 12px; line-height: 1.4; color: var(--text); margin-bottom: 12px; border-left: 2px solid var(--accent); padding-left: 12px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1 style="margin:0; font-size:24px;">Daily Pulse</h1>
            <div id="status" style="font-size:10px; color:var(--text-dim); margin-top:5px; text-transform: uppercase;">Sunday • May 10, 2026</div>
        </header>

        <div class="tab-bar">
            <button id="btn-news" class="tab active" onclick="show('news')">🌐 News</button>
            <button id="btn-nifty" class="tab" onclick="show('nifty')">📈 Nifty</button>
            <button id="btn-market" class="tab" onclick="show('market')">🇮🇳 Market</button>
        </div>

        <div class="glass-card" id="display"></div>
    </div>
