<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Pulse Live</title>
    <meta name="format-detection" content="telephone=no">
    <style>
        /* [Keeping the same premium CSS we built before] */
        * { box-sizing: border-box; }
        body { background: #060910; color: #e2e8f0; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; }
        .glass-card { background: #0f1420; border: 1px solid #1a2035; border-radius: 24px; padding: 24px; margin-bottom: 20px; }
        .tab-bar { display: flex; background: #0f1420; border-radius: 16px; padding: 4px; margin-bottom: 20px; border: 1px solid #1a2035; }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: #64748b; font-weight: bold; border-radius: 12px; }
        .tab.active { background: #4f8ef7; color: white; }
        .price { font-size: 32px; font-weight: 900; text-align: center; margin: 10px 0; }
        .loading { opacity: 0.5; font-style: italic; font-size: 10px; text-align: center; color: #4f8ef7; }
    </style>
</head>
<body>
    <div class="app-container">
        <header style="text-align:center; margin-bottom:30px;">
            <h1 style="margin:0; font-size:32px;">Daily Pulse</h1>
            <div id="last-updated" style="font-size:10px; color:#4b5563; margin-top:5px;">FETCHING LIVE DATA...</div>
        </header>

        <div class="tab-bar">
            <button class="tab active" onclick="showTab('news')">🌐 News</button>
            <button class="tab" onclick="showTab('nifty')">📈 Nifty</button>
            <button class="tab" onclick="showTab('market')">🇮🇳 Market</button>
        </div>

        <div id="content" class="glass-card">
            <div id="live-loader" class="loading">Connecting to Market Feed...</div>
            <div id="display-area">
                </div>
        </div>
    </div>

    <script>
        // LIVE DATA ENGINE
        async function fetchMarketData() {
            try {
                // 1. FETCH LIVE NIFTY (Using a free proxy for demo - in production use Upstox/Groww)
                // Note: For personal use, we fetch a Global Index proxy
                const priceRes = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const priceData = await priceRes.json();
                
                // 2. FETCH LIVE NEWS (Using Google News RSS converted to JSON)
                const newsRes = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=nifty+50+indian+stock+market');
                const newsData = await newsRes.json();

                window.marketData = {
                    price: parseFloat(priceData.price).toLocaleString(),
                    news: newsData.items[0].title,
                    summary: newsData.items[1].title,
                    time: new Date().toLocaleTimeString()
                };

                document.getElementById('live-loader').style.display = 'none';
                document.getElementById('last-updated').innerText = "LIVE • " + window.marketData.time;
                showTab('news'); // Initialize view
            } catch (e) {
                document.getElementById('live-loader').innerText = "CONNECTION ERROR - REFRESHING...";
            }
        }

        function showTab(type) {
            const area = document.getElementById('display-area');
            const d = window.marketData;
            if(!d) return;

            if(type === 'news') {
                area.innerHTML = `
                    <h3 style="color:#f04e6e; margin-top:0;">🌐 WORLD NEWS</h3>
                    <p style="font-size:14px; line-height:1.6; color:#94a3b8;">"${d.news}"</p>
                    <hr style="border:0; border-top:1px solid #1a2035; margin:15px 0;">
                    <p style="font-size:12px; color:#64748b;">${d.summary}</p>
                `;
            } else if(type === 'nifty') {
                area.innerHTML = `
                    <h3 style="color:#22d48f; margin-top:0;">📈 NIFTY 50</h3>
                    <div class="price">${d.price}</div>
                    <p style="text-align:center; color:#64748b; font-size:12px;">Real-time Index Proxy</p>
                `;
            }
            
            // Update Tab Highlight
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event?.target?.classList?.add('active');
        }

        fetchMarketData();
    </script>
</body>
</html>
