<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Pulse Insights</title>
    <style>
        body { background: #060910; color: #e2e8f0; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; }
        .glass-card { background: #0f1420; border: 1px solid #1a2035; border-radius: 24px; padding: 24px; min-height: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tab-bar { display: flex; background: #0f1420; border-radius: 16px; padding: 4px; margin-bottom: 20px; border: 1px solid #1a2035; }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: #64748b; font-weight: bold; border-radius: 12px; font-size: 10px; cursor: pointer; }
        .tab.active { background: #4f8ef7; color: white; }
        
        /* New Insight Box Styling */
        .insight-box { background: rgba(79, 142, 247, 0.05); border: 1px dashed #1a2035; border-radius: 16px; padding: 15px; margin-top: 15px; font-size: 12px; line-height: 1.5; color: #94a3b8; }
        .insight-title { color: #4f8ef7; font-weight: bold; font-size: 10px; margin-bottom: 5px; text-transform: uppercase; display: block; }
        
        .price { font-size: 34px; font-weight: 900; text-align: center; margin: 10px 0; color: #22d48f; letter-spacing: -1px; }
        .news-item { font-size: 12px; line-height: 1.4; color: #e2e8f0; margin-bottom: 12px; border-left: 2px solid #4f8ef7; padding-left: 12px; }
        .level-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a2035; font-size: 12px; }
        .prob-badge { background: rgba(240, 78, 110, 0.1); color: #f04e6e; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <header style="text-align:center; margin-bottom:20px;">
            <h1 style="margin:0; font-size:32px; font-weight: 900;">Daily Pulse</h1>
            <div id="status" style="font-size:9px; color:#4b5563; margin-top:5px; text-transform: uppercase;">Insights Active • Live Feed</div>
        </header>

        <div class="tab-bar">
            <button id="btn-news" class="tab active" onclick="showTab('news')">🌐 Sentiment</button>
            <button id="btn-nifty" class="tab" onclick="showTab('nifty')">📈 Nifty 50</button>
            <button id="btn-market" class="tab" onclick="showTab('market')">🇮🇳 Market</button>
        </div>

        <div class="glass-card" id="display">
            </div>
    </div>

    <script>
        const store = {
            sentiment: 74,
            worldNews: [
                "US Federal Reserve signals 'Higher for Longer' interest rates.",
                "Crude oil prices stabilize amid Middle East ceasefire talks.",
                "Tech sell-off in NASDAQ spills over to Asian markets."
            ],
            worldPossibility: "Expect volatility in currency markets; Dollar Index (DXY) strength may pressure emerging market stocks today.",
            nifty: {
                current: "24,176.15",
                open: "24,210", close: "24,140", s1: "23,950", r1: "24,380",
                prob: "GAP DOWN (60%)",
                trend: "Nifty likely to test S1 levels at open. If 23,950 holds, expect a short-covering rally towards VWAP.",
                news: "Reliance earnings call and HDFC Bank's FII flow data will be the primary drivers for today's session."
            },
            market: {
                sectors: [
                    {name: "IT Sector", val: "+1.2%"},
                    {name: "Banking", val: "-0.9%"},
                    {name: "Reliance", val: "+0.1%"}
                ],
                drivers: "Rising crude prices and a weakening Rupee are the main headwinds for the domestic market today.",
                indiaNews: [
                    "RBI Governor's speech scheduled for 10:00 AM.",
                    "Record GST collection figures boost fiscal sentiment.",
                    "Monsoon progress ahead of schedule in Southern India."
                ]
            }
        };

        function showTab(type) {
            const display = document.getElementById('display');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');

            if(type === 'news') {
                const offset = 251 - (251 * (store.sentiment / 100));
                display.innerHTML = `
                    <div style="display:flex; align-items:center; margin-bottom:25px;">
                        <div style="position:relative; width:80px; height:80px; margin-right:20px;">
                            <svg viewBox="0 0 100 100" style="transform:rotate(-90deg);"><circle cx="50" cy="50" r="40" fill="none" stroke="#1a2035" stroke-width="10"/><circle cx="50" cy="50" r="40" fill="none" stroke="#f04e6e" stroke-width="10" stroke-dasharray="251" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg>
                            <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                                <span style="font-size:18px; font-weight:900; color:#f04e6e;">${store.sentiment}%</span>
                                <span style="font-size:7px; color:#4b5563; font-weight:bold;">NEG</span>
                            </div>
                        </div>
                        <div style="flex:1; font-size:11px; color:#94a3b8; font-style:italic;">"Sentiment remains cautious as global yields remain elevated."</div>
                    </div>
                    <div style="margin-bottom:10px; font-size:10px; color:#4f8ef7; font-weight:bold;">TRENDING WORLD NEWS</div>
                    ${store.worldNews.map(n => `<div class="news-item">${n}</div>`).join('')}
                    <div class="insight-box">
                        <span class="insight-title">🌐 Global Outlook</span>
                        ${store.worldPossibility}
                    </div>
                `;
            } else if(type === 'nifty') {
                display.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size: 11px; color: #64748b; font-weight: bold;">NIFTY 50 DESK</span>
                        <span class="prob-badge">${store.nifty.prob}</span>
                    </div>
                    <div class="price">₹${store.nifty.current}</div>
                    <div class="level-row"><span>S1 / R1</span><span style="color:#fff;">${store.nifty.s1} / ${store.nifty.r1}</span></div>
                    
                    <div class="insight-box" style="border-style: solid; border-color: rgba(34, 212, 143, 0.2);">
                        <span class="insight-title" style="color:#22d48f;">🚀 Probability & Trend</span>
                        ${store.nifty.trend}
                    </div>
                    <div class="insight-box">
                        <span class="insight-title">📢 Market Movers</span>
                        ${store.nifty.news}
                    </div>
                `;
            } else if(type === 'market') {
                display.innerHTML = `
                    <div style="margin-bottom:15px; font-size:10px; color:#4f8ef7; font-weight:bold;">SECTOR HEATMAP</div>
                    ${store.market.sectors.map(s => `<div class="level-row"><span>${s.name}</span><span style="${s.val.includes('+') ? 'color:#22d48f' : 'color:#f04e6e'}">${s.val}</span></div>`).join('')}
                    
                    <div class="insight-box" style="background: rgba(255, 255, 255, 0.02);">
                        <span class="insight-title">🇮🇳 Domestic Impact</span>
                        ${store.market.drivers}
                    </div>

                    <div style="margin-top:20px; font-size:10px; color:#4f8ef7; font-weight:bold;">TOP 3 INDIA HEADLINES</div>
                    ${store.market.indiaNews.map(n => `<div class="news-item" style="border-color:#22d48f;">${n}</div>`).join('')}
                `;
            }
        }

        showTab('news');
    </script>
</body>
</html>
