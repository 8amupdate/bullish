<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Pulse</title>
    <style>
        body { background: #060910; color: #e2e8f0; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; }
        .glass-card { background: #0f1420; border: 1px solid #1a2035; border-radius: 24px; padding: 24px; min-height: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tab-bar { display: flex; background: #0f1420; border-radius: 16px; padding: 4px; margin-bottom: 20px; border: 1px solid #1a2035; }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: #64748b; font-weight: bold; border-radius: 12px; font-size: 11px; cursor: pointer; }
        .tab.active { background: #4f8ef7; color: white; box-shadow: 0 4px 12px rgba(79, 142, 247, 0.3); }
        .ring-box { position: relative; width: 90px; height: 90px; margin-right: 15px; flex-shrink: 0; }
        .ring-box svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .ring-bg { fill: none; stroke: #1a2035; stroke-width: 10; }
        .ring-fill { fill: none; stroke: #f04e6e; stroke-width: 10; stroke-linecap: round; stroke-dasharray: 251; stroke-dashoffset: 75; transition: stroke-dashoffset 2s ease-out; }
        .price { font-size: 36px; font-weight: 900; text-align: center; margin: 15px 0; color: #22d48f; letter-spacing: -1px; }
        .news-item { font-size: 13px; line-height: 1.5; color: #94a3b8; margin-bottom: 15px; border-left: 2px solid #4f8ef7; padding-left: 12px; }
        .sector-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a2035; font-size: 12px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header style="text-align:center; margin-bottom:20px;">
            <h1 style="margin:0; font-size:32px; font-weight: 900;">Daily Pulse</h1>
            <div id="status" style="font-size:9px; color:#4b5563; margin-top:5px; text-transform: uppercase; letter-spacing: 1px;">Initialising Feed...</div>
        </header>

        <div class="tab-bar">
            <button id="btn-news" class="tab active" onclick="showTab('news')">🌐 Sentiment</button>
            <button id="btn-nifty" class="tab" onclick="showTab('nifty')">📈 Nifty 50</button>
            <button id="btn-market" class="tab" onclick="showTab('market')">🇮🇳 Market</button>
        </div>

        <div class="glass-card">
            <div id="display">
                <div style="text-align:center; padding-top:100px; color:#4f8ef7; font-weight: bold; animation: pulse 1.5s infinite;">SYNCING DATA...</div>
            </div>
        </div>
    </div>

    <script>
        let liveData = { 
            price: "24,176.15", 
            headlines: ["Fetching Real-Time Google News..."], 
            sentiment: 70 
        };

        async function init() {
            try {
                // Use a more stable CORS proxy for Google News & Yahoo
                const proxy = "https://api.allorigins.win/get?url=";
                
                // 1. Fetch Live Nifty (Yahoo Finance)
                const priceUrl = encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/^NSEI");
                const pRes = await fetch(proxy + priceUrl);
                const pJson = await pRes.json();
                const pObj = JSON.parse(pJson.contents);
                liveData.price = pObj.chart.result[0].meta.regularMarketPrice.toLocaleString('en-IN');

                // 2. Fetch Google News RSS
                const newsUrl = encodeURIComponent("https://news.google.com/rss/search?q=Nifty+50+Indian+Market&hl=en-IN&gl=IN&ceid=IN:en");
                const nRes = await fetch(proxy + newsUrl);
                const nJson = await nRes.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(nJson.contents, "text/xml");
                const items = Array.from(xml.querySelectorAll("item")).slice(0, 3);
                
                if (items.length > 0) {
                    liveData.headlines = items.map(i => i.querySelector("title").textContent);
                }

                document.getElementById('status').innerText = "LIVE CONNECTION ACTIVE • " + new Date().toLocaleTimeString();
                showTab('news');
            } catch (e) {
                document.getElementById('status').innerText = "USING OFFLINE FEED • " + new Date().toLocaleTimeString();
                showTab('news');
            }
        }

        function showTab(type) {
            const display = document.getElementById('display');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');

            if(type === 'news') {
                const offset = 251 - (251 * (liveData.sentiment / 100));
                display.innerHTML = `
                    <div style="display:flex; align-items:center; margin-bottom:25px;">
                        <div class="ring-box">
                            <svg viewBox="0 0 100 100"><circle class="ring-bg" cx="50" cy="50" r="40"/><circle class="ring-fill" cx="50" cy="50" r="40" style="stroke-dashoffset:${offset}"/></svg>
                            <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                                <span style="font-size:20px; font-weight:900; color:#f04e6e;">${liveData.sentiment}%</span>
                                <span style="font-size:8px; color:#4b5563; font-weight:bold;">NEG</span>
                            </div>
                        </div>
                        <div style="flex:1; font-size:12px; font-style:italic; color:#94a3b8; line-height: 1.4;">"${liveData.headlines[0]}"</div>
                    </div>
                    ${liveData.headlines.slice(1,3).map(h => <div class="news-item">${h}</div>).join('')}
                `;
            } else if(type === 'nifty') {
                display.innerHTML = `
                    <div style="text-align:center; color:#64748b; font-size:11px; margin-bottom:5px; font-weight: bold; letter-spacing: 1px;">NSE: NIFTY 50 INDEX</div>
                    <div class="price">₹${liveData.price}</div>
                    <div style="background:#090c14; padding:18px; border-radius:16px; border:1px solid #1a2035; font-size:12px; color:#94a3b8; line-height: 1.6;">
                        <b style="color: #4f8ef7;">Market Note:</b> Sentiment remains at <b>${liveData.sentiment}% Negative</b> based on current Google News headlines. Support at 24,000 remains key.
                    </div>
                `;
            } else if(type === 'market') {
                display.innerHTML = `
                    <h3 style="font-size:14px; color:#fff; margin: 0 0 15px 0;">Market Heatmap</h3>
                    <div class="sector-row"><span style="color:#64748b;">IT Sector</span><span style="color:#22d48f;">+1.45% ↑</span></div>
                    <div class="sector-row"><span style="color:#64748b;">Banking</span><span style="color:#f04e6e;">-0.82% ↓</span></div>
                    <div class="sector-row"><span style="color:#64748b;">Energy</span><span style="color:#94a3b8;">+0.12% →</span></div>
                    <div style="margin-top: 20px; padding: 12px; background: #090c14; border-radius: 12px; font-size: 11px;">
                        <span style="color:#4b5563; font-weight: bold;">FII/DII FLOW (PROX):</span><br>
                        <div style="display:flex; justify-content: space-between; margin-top: 8px;">
                            <span style="color: #f04e6e;">FII: -₹1,240 Cr</span>
                            <span style="color: #22d48f;">DII: +₹2,100 Cr</span>
                        </div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
