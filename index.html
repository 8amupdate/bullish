<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Pulse Live</title>
    <style>
        body { background: #060910; color: #e2e8f0; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; }
        .glass-card { background: #0f1420; border: 1px solid #1a2035; border-radius: 24px; padding: 24px; margin-bottom: 20px; }
        .tab-bar { display: flex; background: #0f1420; border-radius: 16px; padding: 4px; margin-bottom: 20px; border: 1px solid #1a2035; }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: #64748b; font-weight: bold; border-radius: 12px; font-size: 11px; }
        .tab.active { background: #4f8ef7; color: white; }
        
        /* Sentiment Meter Styles */
        .sentiment-flex { display: flex; align-items: center; gap: 20px; margin: 20px 0; }
        .ring-box { position: relative; width: 100px; height: 100px; }
        .ring-box svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .ring-bg { fill: none; stroke: #1a2035; stroke-width: 10; }
        .ring-fill { fill: none; stroke: #f04e6e; stroke-width: 10; stroke-linecap: round; stroke-dasharray: 251; transition: stroke-dashoffset 2s ease-out; }
        .ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .price { font-size: 32px; font-weight: 900; text-align: center; margin: 10px 0; color: #22d48f; }
        .news-item { font-size: 13px; line-height: 1.5; color: #94a3b8; margin-bottom: 12px; border-left: 2px solid #4f8ef7; padding-left: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header style="text-align:center; margin-bottom:20px;">
            <h1 style="margin:0; font-size:32px;">Daily Pulse</h1>
            <div id="status" style="font-size:9px; color:#4b5563; margin-top:5px; letter-spacing:1px;">SYNCING SECURE FEED...</div>
        </header>

        <div class="tab-bar">
            <button id="btn-news" class="tab active" onclick="showTab('news')">🌐 Sentiment</button>
            <button id="btn-nifty" class="tab" onclick="showTab('nifty')">📈 Nifty 50</button>
            <button id="btn-market" class="tab" onclick="showTab('market')">🇮🇳 Market</button>
        </div>

        <div id="main-content" class="glass-card">
            <div id="loader" style="text-align:center; padding:40px; color:#4f8ef7;">ANALYZING LIVE DATA...</div>
            <div id="display" style="display:none;"></div>
        </div>
    </div>

    <script>
        let liveData = { price: 0, headlines: [], sentiment: 50 };

        async function init() {
            try {
                const proxy = "https://api.allorigins.win/get?url=";
                
                // 1. Fetch Nifty Price
                const priceUrl = encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/^NSEI");
                const priceRes = await fetch(proxy + priceUrl);
                const priceJson = await priceRes.json();
                const pData = JSON.parse(priceJson.contents);
                liveData.price = pData.chart.result[0].meta.regularMarketPrice;

                // 2. Fetch News & Calculate Sentiment
                const newsUrl = encodeURIComponent("https://news.google.com/rss/search?q=Nifty+50+Market+India+Geopolitics&hl=en-IN&gl=IN&ceid=IN:en");
                const newsRes = await fetch(proxy + newsUrl);
                const newsJson = await newsRes.json();
                const xml = new DOMParser().parseFromString(newsJson.contents, "text/xml");
                const items = Array.from(xml.querySelectorAll("item")).slice(0, 5);
                
                liveData.headlines = items.map(i => i.querySelector("title").innerHTML);
                
                // Simple Sentiment Logic
                const negWords = ['conflict', 'strike', 'dead', 'fall', 'hit', 'war', 'tensions', 'attack', 'crash', 'negative'];
                const text = liveData.headlines.join(' ').toLowerCase();
                let negCount = 0;
                negWords.forEach(word => { if(text.includes(word)) negCount++; });
                
                // Base 40% negative + extra for each bad word found
                liveData.sentiment = Math.min(95, 40 + (negCount * 10));

                document.getElementById('loader').style.display = 'none';
                document.getElementById('display').style.display = 'block';
                document.getElementById('status').innerText = "LIVE CONNECTION ACTIVE • " + new Date().toLocaleTimeString();
                
                showTab('news');
            } catch (e) {
                document.getElementById('loader').innerText = "FEED ERROR. PLEASE REFRESH.";
            }
        }

        function showTab(type) {
            const display = document.getElementById('display');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');

            if(type === 'news') {
                const offset = 251 - (251 * (liveData.sentiment / 100));
                display.innerHTML = `
                    <div style="font-size:12px; font-weight:bold; color:#4f8ef7; margin-bottom:10px;">WORLD NEWS SENTIMENT</div>
                    <div class="sentiment-flex">
                        <div class="ring-box">
                            <svg viewBox="0 0 100 100">
                                <circle class="ring-bg" cx="50" cy="50" r="40" />
                                <circle class="ring-fill" cx="50" cy="50" r="40" style="stroke-dashoffset: ${offset};" />
                            </svg>
                            <div class="ring-text">
                                <span style="font-size:22px; font-weight:900; color:#f04e6e;">${liveData.sentiment}%</span>
                                <span style="font-size:8px; color:#4b5563; font-weight:bold;">NEG</span>
                            </div>
                        </div>
                        <div style="flex:1;">
                            <div class="news-item" style="font-style:italic; font-size:12px;">"${liveData.headlines[0]}"</div>
                        </div>
                    </div>
                    <div style="margin-top:20px;">
                        ${liveData.headlines.slice(1, 3).map(h => <div class="news-item">${h}</div>).join('')}
                    </div>
                `;
            } else if(type === 'nifty') {
                display.innerHTML = `
                    <div style="text-align:center; color:#64748b; font-size:11px; margin-bottom:10px;">NSE: NIFTY 50 INDEX</div>
                    <div class="price">₹${liveData.price.toLocaleString('en-IN')}</div>
                    <div style="background:#090c14; padding:15px; border-radius:12px; border:1px solid #1a2035; margin-top:20px;">
                        <p style="font-size:12px; color:#94a3b8; margin:0;"><b>Strategy:</b> Automated Sentiment is <b>${liveData.sentiment > 60 ? 'Bearish' : 'Bullish'}</b>. Trade with caution around major support levels.</p>
                    </div>
                `;
            } else {
                display.innerHTML = <div style="text-align:center; color:#4b5563; padding:40px;">Market Heatmap Syncing...</div>;
            }
        }

        init();
    </script>
</body>
</html>
