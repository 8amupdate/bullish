<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Pulse</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #060910; --card: #0f1420; --border: #1a2035; --blue: #4f8ef7; --red: #f04e6e; --green: #22d48f; }
        body { background: var(--bg); color: #e2e8f0; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 20px; }
        
        .header { text-align: center; margin: 40px 0 30px; }
        h1 { font-size: 32px; margin: 0; font-weight: 900; letter-spacing: -1px; }
        .date { font-size: 11px; color: #4b5563; margin-top: 5px; font-family: monospace; }

        /* Navigation Tabs */
        .tabs { display: flex; gap: 8px; background: var(--card); padding: 5px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; }
        .tab { flex: 1; padding: 12px; border-radius: 12px; text-align: center; font-size: 12px; font-weight: bold; color: #94a3b8; text-decoration: none; }
        .tab.active { background: var(--blue); color: white; box-shadow: 0 4px 12px rgba(79, 142, 247, 0.3); }

        /* Main Dashboard Card */
        .glass-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; }
        .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .section-header span { color: var(--blue); }
        .section-header h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin: 0; }

        /* Sentiment Circle Area */
        .sentiment-box { display: flex; align-items: center; gap: 30px; margin-bottom: 25px; }
        .circle { position: relative; width: 90px; height: 90px; border-radius: 50%; background: conic-gradient(var(--red) 70%, var(--green) 70% 88%, #f5c542 88%); display: flex; align-items: center; justify-content: center; }
        .circle::after { content: "70%\nNEG"; white-space: pre; position: absolute; width: 70px; height: 70px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 14px; font-weight: 900; color: var(--red); line-height: 1; }

        .bars { flex: 1; }
        .bar-row { margin-bottom: 12px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
        .bar-bg { height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 10px; }

        .summary { font-size: 13px; line-height: 1.6; color: #94a3b8; font-style: italic; border-top: 1px solid var(--border); padding-top: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Daily Pulse</h1>
            <div class="date">SUNDAY, MAY 10, 2026</div>
        </div>

        <div class="tabs">
            <a href="#"        <div class="card">
            <div class="news-title">🌐 WORLD SENTIMENT</div>
            <div class="news-text">
                "Global mood is heavily negative today. The US-Israel-Iran conflict dominates headlines. A fragile 3-day ceasefire offers a small ray of hope."
            </div>
            
            <div style="margin-top: 25px; margin-bottom: 10px; font-size: 12px; font-weight: bold; color: #4f8ef7;">📈 MARKET SNAPSHOT</div>
            
            <div class="nifty-row">
                <span class="label">Nifty 50</span>
                <span class="value">24,330 (+1.24%)</span>
            </div>
            <div class="nifty-row">
                <span class="label">Outlook</span>
                <span class="value" style="color: #4f8ef7;">Bullish</span>
            </div>
            <div class="nifty-row" style="border: none;">
                <span class="label">Support</span>
                <span class="value">24,000</span>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 40px; font-size: 10px; color: #1a2035; font-family: monospace;">
            VERIFIED STABLE VERSION 1.0
        </div>
    </div>

</body>
</html>
