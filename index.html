<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Pulse</title>
    <style>
        body { background: #060910; color: #e2e8f0; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; }
        .glass-card { background: #0f1420; border: 1px solid #1a2035; border-radius: 24px; padding: 24px; min-height: 350px; }
        .tab-bar { display: flex; background: #0f1420; border-radius: 16px; padding: 4px; margin-bottom: 20px; border: 1px solid #1a2035; }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: #64748b; font-weight: bold; border-radius: 12px; font-size: 11px; cursor: pointer; }
        .tab.active { background: #4f8ef7; color: white; }
        .price { font-size: 32px; font-weight: 900; text-align: center; margin: 15px 0; color: #22d48f; }
        .news-item { font-size: 13px; line-height: 1.5; color: #94a3b8; margin-bottom: 12px; border-left: 2px solid #4f8ef7; padding-left: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header style="text-align:center; margin-bottom:20px;">
            <h1 style="margin:0; font-size:32px;">Daily Pulse</h1>
            <div id="status" style="font-size:9px; color:#4b5563; margin-top:5px;">FEED READY</div>
        </header>

        <div class="tab-bar">
            <button id="btn-news" class="tab active" onclick="showTab('news')">🌐 Sentiment</button>
            <button id="btn-nifty" class="tab" onclick="showTab('nifty')">📈 Nifty 50</button>
            <button id="btn-market" class="tab" onclick="showTab('market')">🇮🇳 Market</button>
        </div>

        <div class="glass-card">
            <div id="display">
                <div style="text-align:center; padding-top:80px; color:#4f8ef7; font-weight:bold; letter-spacing:1px;">
                    INITIALIZING...
                </div>
            </div>
        </div>
    </div>

    <script>
        // STABLE DATA (If live fetch fails, this shows)
        let liveData = { 
            price: "24,176.15", 
            headlines: [
                "Nifty 50 stabilizes above 24,000 support level", 
                "Global sentiment remains cautious amid energy concerns", 
                "DII support continues to offset FII selling"
            ], 
            sentiment: 70 
        };

        function showTab(type) {
            const display = document.getElementById('display');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');

            if(type === 'news') {
                const offset = 251 - (251 * (liveData.sentiment / 100));
                display.innerHTML = `
                    <div style="display:flex; align-items:center; margin-bottom:20px;">
                        <div style="position:relative; width:80px; height:80px; margin-right:20px;">
                            <svg viewBox="0 0 100 100" style="transform:rotate(-90deg);"><circle cx="50" cy="50" r="40" fill="none" stroke="#1a2035" stroke-width="10"/><circle cx="50" cy="50" r="40" fill="none" stroke="#f04e6e" stroke-width="10" stroke-dasharray="251" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg>
                            <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                                <span style="font-size:18px; font-weight:900; color:#f04e6e;">${liveData.sentiment}%</span>
                                <span style="font-size:7px; color:#4b5563;">NEG</span>
                            </div>
                        </div>
                        <div style="flex:1; font-size:12px; font-style:italic; color:#94a3b8;">"${liveData.headlines[0]}"</div>
                    </div>
                    ${liveData.headlines.slice(1,3).map(h => <div class="news-item">${h}</div>).join('')}
                `;
            } else if(type === 'nifty') {
                display.innerHTML = `
                    <div style="text-align:center; color:#64748b; font-size:11px; margin-bottom:10px;">NSE: NIFTY 50 INDEX</div>
                    <div class="price">₹${liveData.price}</div>
                    <div style="background:#090c14; padding:15px; border-radius:12px; border:1px solid #1a2035; font-size:12px; color:#94a3b8;">
                        <b>Trend:</b> Market sentiment is <b>Cautious</b>. 
                        Watch support at 24,000 for upcoming sessions.
                    </div>
                `;
            } else {
                display.innerHTML = `
                    <div style="text-align:center; padding:40px;">
                        <div style="font-size:24px; margin-bottom:10px;">🇮🇳</div>
                        <div style="color:#64748b; font-size:12px;">Market Heatmap and Institutional Flow data updates every 15 mins during market hours.</div>
                    </div>
                `;
            }
        }

        async function startApp() {
            // Force the dashboard to show after 2 seconds no matter what
            const forceLoad = setTimeout(() => {
                render();
            }, 2000);

            try {
                // Try to get live price (Yahoo Finance Proxy)
                const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/^NSEI"));
                const json = await res.json();
                const d = JSON.parse(json.contents);
                const livePrice = d.chart.result[0].meta.regularMarketPrice;
                if(livePrice) {
                    liveData.price = livePrice.toLocaleString('en-IN');
                }
            } catch (e) {
                console.log("Using default stable data");
            }
            
            render();
            clearTimeout(forceLoad);
        }

        function render() {
            document.getElementById('status').innerText = "LIVE CONNECTION ACTIVE • " + new Date().toLocaleTimeString();
            showTab('news');
        }

        startApp();
    </script>
</body>
</html>
