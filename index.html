<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Pulse Pro</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --pos: #23d18b;
            --neg: #f04e6e;
            --neu: #f1c40f;
            --text: #c9d1d9;
            --text-dim: #8b949e;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 440px; }

        /* Header & Tabs */
        header { text-align: center; margin-bottom: 25px; }
        .tab-bar { 
            display: flex; background: var(--card-bg); border-radius: 14px; 
            padding: 4px; margin-bottom: 25px; border: 1px solid var(--border);
        }
        .tab { 
            flex: 1; padding: 10px; border: none; background: transparent; 
            color: var(--text-dim); font-weight: 600; border-radius: 10px; font-size: 13px;
        }
        .tab.active { background: #388bfd; color: white; }

        /* Main Dashboard Card */
        .glass-card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 24px; padding: 24px; min-height: 500px;
        }

        /* Donut Chart Styling */
        .donut-container { display: flex; align-items: center; justify-content: space-around; margin-bottom: 30px; }
        .donut-box { position: relative; width: 120px; height: 120px; }
        .donut-box svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .donut-center {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        /* Progress Bars */
        .stat-row { margin-bottom: 15px; }
        .stat-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
        .bar-bg { background: #21262d; height: 8px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 10px; transition: width 1.5s ease-in-out; }

        /* Level Cards */
        .level-card {
            background: #0d1117; border-radius: 12px; padding: 12px 16px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid transparent;
        }
        .level-label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
        .level-val { font-size: 14px; font-weight: 700; font-family: monospace; }

        /* Insight Box */
        .insight-box {
            background: #161b22; border: 1px solid var(--border); border-radius: 16px;
            padding: 16px; margin-top: 20px; line-height: 1.6; font-size: 13px; font-style: italic; color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1 style="margin:0; font-size:24px;">Daily Pulse</h1>
            <div id="status" style="font-size:10px; color:var(--text-dim); margin-top:5px;">MAY 10, 2026 • ESTIMATED</div>
        </header>

        <div class="tab-bar">
            <button class="tab active" onclick="show('news')">🌐 News</button>
            <button class="tab" onclick="show('nifty')">📈 Nifty</button>
            <button class="tab" onclick="show('market')">🇮🇳 Market</button>
        </div>

        <div class="glass-card" id="display">
            </div>
    </div>

    <script>
        const store = {
            sentiment: { pos: 20, neg: 68, neu: 12 },
            levels: [
                { l: "Strong Resistance", v: "25,000", c: "#f04e6e" },
                { l: "Resistance", v: "24,700", c: "#f04e6e" },
                { l: "Current Close", v: "24,330", c: "#388bfd" },
                { l: "Support", v: "24,000-24,100", c: "#23d18b" },
                { l: "Strong Support", v: "23,800", c: "#23d18b" }
            ],
            brief: "Today's global news is dominated by geopolitical tensions and economic uncertainty. A few diplomatic breakthroughs provide some relief."
        };

        function show(type) {
            const display = document.getElementById('display');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if(type === 'news') {
                display.innerHTML = `
                    <div class="donut-container">
                        <div class="donut-box">
                            <svg viewBox="0 0 36 36">
                                <circle stroke="#21262d" stroke-width="3" fill="transparent" r="16" cx="18" cy="18"/>
                                <circle stroke="var(--pos)" stroke-width="3" stroke-dasharray="20 80" fill="transparent" r="16" cx="18" cy="18"/>
                                <circle stroke="var(--neg)" stroke-width="3" stroke-dasharray="68 32" stroke-dashoffset="-20" fill="transparent" r="16" cx="18" cy="18"/>
                            </svg>
                            <div class="donut-center">
                                <span style="font-size:20px; font-weight:800; color:var(--neg);">${store.sentiment.neg}%</span>
                                <span style="font-size:7px; color:var(--text-dim); font-weight:bold;">NEGATIVE</span>
                            </div>
                        </div>
                        <div style="flex:1; padding-left:20px;">
                            ${statRow("Positive", store.sentiment.pos, "var(--pos)")}
                            ${statRow("Negative", store.sentiment.neg, "var(--neg)")}
                            ${statRow("Neutral", store.sentiment.neu, "var(--neu)")}
                        </div>
                    </div>
                    <div class="insight-box">${store.brief}</div>
                `;
            } else {
                display.innerHTML = `
                    <div style="font-size:10px; color:var(--text-dim); margin-bottom:15px; font-weight:bold; letter-spacing:1px;">KEY LEVELS</div>
                    ${store.levels.map(lv => `
                        <div class="level-card" style="border-color: ${lv.c}33">
                            <span class="level-label">${lv.l}</span>
                            <span class="level-val" style="color:${lv.c}">${lv.v}</span>
                        </div>
                    `).join('')}
                    <div class="level-card" style="margin-top:20px; background:#1c2128;">
                        <div style="font-size:12px;">🏦 Bank Nifty</div>
                        <div style="font-size:12px; font-weight:bold; color:var(--pos);">55,981 <span style="font-size:10px;">+1,434</span></div>
                    </div>
                `;
            }
        }

        function statRow(label, val, color) {
            return `
                <div class="stat-row">
                    <div class="stat-header"><span>${label}</span><span style="color:${color}">${val}%</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${val}%; background:${color}"></div></div>
                </div>
            `;
        }

        show('news');
    </script>
</body>
</html>
